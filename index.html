<script>
async function subscribe(){
  try {
    const res = await fetch("https://zahav-land-pro-backend.onrender.com/api/billing/subscribe", {
      method: "POST"
    });

    const data = await res.json();

    console.log(data);

    if(data.url){
      window.location = data.url;
    } else {
      alert("No checkout URL returned");
    }

  } catch(err){
    console.error(err);
    alert("Error connecting to backend");
  }
}
</script>
